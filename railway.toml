# Prefer backend/railway.toml when Root Directory = /backend (current setup).
# This file is for deploying from repo root with Dockerfile.api instead.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
