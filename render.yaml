services:
  - type: web
    name: cving
    runtime: docker
    plan: free
    # API only — frontend on Vercel (fast CDN). Use Dockerfile for all-in-one.
    dockerfilePath: ./Dockerfile.api
    healthCheckPath: /health
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: SERVE_FRONTEND
        value: "0"
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://c-ving.vercel.app
      - key: DEFAULT_GITHUB_USERNAME
        sync: false
