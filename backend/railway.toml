# Railway service Root Directory = /backend
# Builder: Docker → Dockerfile in this folder (Playwright + Chromium)
#
# IMPORTANT: leave Start Command EMPTY in Railway Settings → Deploy.
# A custom start command like `uvicorn ... --port $PORT` runs without a shell
# and crashes with: Invalid value for '--port': '$PORT'

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
